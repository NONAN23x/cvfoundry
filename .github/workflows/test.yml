name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - run: docker build -t cvfoundry:test .
      - run: docker run --rm --entrypoint uv -e RUN_LIBREOFFICE_INTEGRATION=1 cvfoundry:test run python -m unittest discover -s tests -v
